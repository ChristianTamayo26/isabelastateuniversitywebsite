<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision - ISU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8f5e9 100%);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 40px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1;
        }

        .header h1 {
            color: white;
            font-size: 2em;
            font-weight: 700;
        }

        .isuprofile {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .nav-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .nav-buttons button:hover {
            background-color: rgba(255, 255, 255, 0.3);
            border-color: white;
        }

        .nav-buttons button a {
            text-decoration: none;
            color: white;
        }

        .container {
            max-width: 900px;
            margin: 80px auto;
            padding: 0 20px;
        }

        .page-title {
            color: #1b5e20;
            font-size: 3em;
            text-align: center;
            margin-bottom: 50px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .content {
            background: white;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(46, 125, 50, 0.1);
            border-left: 5px solid #2e7d32;
        }

        .content p {
            color: #333;
            font-size: 1.2em;
            line-height: 1.8;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <img src="isuprofile.png.jpg" alt="isu-logo" class="isuprofile">    
            <h1>ISABELA STATE UNIVERSITY</h1>
        </div>
        <div class="nav-buttons">
            <button><a href="websitehome.html">Home</a></button>
            <button><a href="about.html">About</a></button>
            <button><a href="programs.html">Programs</a></button>
            <button><a href="facilities.html">Facilities</a></button>
            <button><a href="contact.html">Contact</a></button>
            <button><a href="vision.html">Vision</a></button>
            <button><a href="mission.html">Mission</a></button>
            <button><a href="https://youtu.be/Pt7uj_5ozus?si=deCSLmCzT4NH6OpY" target="_blank">Hymn</a></button>
        </div>
    </div>
    <div class="container">
        <h1 class="page-title">Vision</h1>
        <div class="content">
            <p>By 2030, ISU as a model Smart-Green University internationally recognized for positive societal transformation.</p>
        </div>
    </div>
</body>
</html>
